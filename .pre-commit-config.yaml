minimum_pre_commit_version: "3.7.0"
default_install_hook_types: [pre-commit, pre-push]
default_stages: [pre-commit, pre-push]

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: check-added-large-files
        name: Large Files Check
        args: ["--maxkb=1024"]
        stages: [pre-push]

      - id: detect-aws-credentials
        name: Check AWS Credentials
        args:
          - "--allow-missing-credentials"
        stages: [pre-push]

      - id: detect-private-key
        name: Check Private Keys
        stages: [pre-push]

      - id: check-merge-conflict
        name: Merge Conflict Resolution Check
        stages: [pre-commit, pre-push]

      - id: end-of-file-fixer
        name: Newline EOF Checker
        stages: [pre-commit, pre-push]

      - id: fix-byte-order-marker
        name: Fix UTF-8 byte order marker
        stages: [pre-commit, pre-push]

      - id: trailing-whitespace
        name: Whitespace Cleaning Check
        args: [--markdown-linebreak-ext=md]
        stages: [pre-commit, pre-push]

  - repo: https://github.com/sirosen/fix-smartquotes
    rev: 0.2.0
    hooks:
      - id: fix-smartquotes
        name: Fix Quotes
        stages: [pre-commit, pre-push]

  - repo: https://github.com/scop/pre-commit-shfmt
    rev: v3.12.0-2
    hooks:
      - id: shfmt
        name: Shell Script Format
        files: ^scripts/.*\.sh$
        stages: [pre-commit, pre-push]

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        name: Shell Script Lint
        files: ^scripts/.*\.sh$
        stages: [pre-commit, pre-push]

  - repo: https://github.com/DavidAnson/markdownlint-cli2
    rev: v0.18.1
    hooks:
      - id: markdownlint-cli2
        name: Markdown Lint
        args: ["--fix", "--config=.markdownlint-cli2.jsonc"]
        stages: [pre-commit, pre-push]

  - repo: https://github.com/adrienverge/yamllint.git
    rev: v1.37.1
    hooks:
      - id: yamllint
        name: YAML Lint
        args: ["-c=.yamllint"]
        stages: [pre-commit, pre-push]

  - repo: https://github.com/rhysd/actionlint
    rev: v1.7.11
    hooks:
      - id: actionlint
        name: GitHub Workflow Lint
        files: ^\.github/workflows/.*\.ya?ml$
        stages: [pre-commit, pre-push]

  - repo: local
    hooks:
      - id: backend-build
        name: Backend Build
        language: system
        entry: npm --prefix backend run build
        files: ^backend/.*\.(ts|tsx|js|json)$
        pass_filenames: false
        stages: [pre-push]

      - id: frontend-build
        name: Frontend Build
        language: system
        entry: npm --prefix frontend run build
        files: ^frontend/.*\.(ts|tsx|js|jsx|json|css)$
        pass_filenames: false
        stages: [pre-push]
