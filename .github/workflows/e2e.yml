name: E2E Tests

permissions:
  contents: read

on:
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: e2e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  e2e:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup Tooling
        uses: ./.github/actions/setup

      - name: Run Flight Check
        run: npm run flight-check

      - name: Upload test logs and reports
        if: always()
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: clustercodex-e2e-artifacts
          path: |
            /tmp/clustercodex-frontend.log
            playwright-report/
            test-results/
          if-no-files-found: ignore
          retention-days: 14
