version: 2
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      all:
        applies-to: version-updates
        patterns: ["*"]
      all-security:
        applies-to: security-updates
        patterns: ["*"]

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(ci)"
    groups:
      all:
        applies-to: version-updates
        patterns: ["*"]
      all-security:
        applies-to: security-updates
        patterns: ["*"]
